<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 maximum-scale=1.0, user-scalable=no 防止手機上快速點擊時畫面意外放大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍲 怪獸廚房：拖曳大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 廚房的木紋背景顏色 */
            background-color: #f3aa4e;
            background-image: repeating-linear-gradient(45deg, #e69a3b 25%, transparent 25%, transparent 75%, #e69a3b 75%, #e69a3b), repeating-linear-gradient(45deg, #e69a3b 25%, #f3aa4e 25%, #f3aa4e 75%, #e69a3b 75%, #e69a3b);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        /* 食材的樣式，加上可以拖曳的鼠標提示 */
        .ingredient {
            cursor: grab;
            transition: transform 0.2s;
            /* 防止手機長按選取文字 */
            user-select: none; 
            -webkit-user-select: none;
        }
        .ingredient:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* 鍋子發光的動畫 */
        @keyframes glow {
            0% { box-shadow: 0 0 10px #ff7e67; }
            50% { box-shadow: 0 0 30px #ffdf00; }
            100% { box-shadow: 0 0 10px #ff7e67; }
        }
        .pot-active {
            animation: glow 1s infinite alternate;
            transform: scale(1.05);
            transition: all 0.3s;
        }

        /* 飢餓度進度條 */
        .hunger-bar-container {
            width: 100%;
            height: 20px;
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .hunger-bar {
            height: 100%;
            width: 100%;
            background-color: #2ed573;
            transition: width 0.1s linear, background-color 0.3s;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-sans p-2 md:p-4">

    <!-- 遊戲區域白板 -->
    <div class="bg-white/95 backdrop-blur-sm p-4 md:p-6 rounded-3xl shadow-2xl max-w-2xl w-full border-4 md:border-8 border-yellow-800 text-center relative overflow-hidden">
        
        <!-- 遊戲開始遮罩 (選擇難度與遊戲說明) -->
        <div id="start-screen" class="absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center rounded-2xl p-4 overflow-y-auto">
            <div class="text-6xl md:text-7xl mb-2 mt-4">🍲</div>
            <h2 class="text-3xl md:text-4xl font-black text-orange-400 mb-4">怪獸廚房</h2>
            
            <!-- 📜 遊戲說明區塊 -->
            <div class="bg-white/10 border-2 border-orange-300 rounded-2xl p-4 md:p-5 max-w-md text-left mb-6 backdrop-blur-sm shadow-lg w-full">
                <h3 class="text-xl md:text-2xl font-bold text-yellow-300 mb-3 text-center">📜 遊戲玩法</h3>
                <ul class="text-base md:text-lg text-white space-y-3">
                    <li class="flex items-start">
                        <span class="text-2xl mr-2">👀</span> 
                        <span><strong>觀察題目：</strong>找出兩個分數的「最小公分母」。</span>
                    </li>
                    <li class="flex items-start">
                        <span class="text-2xl mr-2">🖐️</span> 
                        <span><strong>餵食怪獸：</strong>將正確數字的食材<strong>「拖曳」</strong>或<strong>「點擊」</strong>丟進鍋子裡。</span>
                    </li>
                    <li class="flex items-start">
                        <span class="text-2xl mr-2">⏱️</span> 
                        <span><strong>注意飢餓度：</strong>怪獸會越來越餓！答對能補血，答錯會餓得更快喔！</span>
                    </li>
                </ul>
            </div>

            <h3 class="text-lg md:text-xl font-bold text-white mb-4">請選擇挑戰難度：</h3>
            <div class="flex flex-wrap justify-center gap-3 mb-4 w-full">
                <button onclick="startGame('easy')" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 md:py-3 px-4 md:px-6 rounded-full text-lg md:text-xl shadow-lg transform transition hover:scale-105">🟢 簡單</button>
                <button onclick="startGame('medium')" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 md:py-3 px-4 md:px-6 rounded-full text-lg md:text-xl shadow-lg transform transition hover:scale-105">🟡 中等</button>
                <button onclick="startGame('hard')" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 md:py-3 px-4 md:px-6 rounded-full text-lg md:text-xl shadow-lg transform transition hover:scale-105">🔴 困難</button>
                <button onclick="startGame('superHard')" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 md:py-3 px-4 md:px-6 rounded-full text-lg md:text-xl shadow-lg transform transition hover:scale-105">🟣 超困難</button>
                <button onclick="startGame('hell')" class="bg-black hover:bg-gray-800 text-red-500 border border-red-500 font-bold py-2 md:py-3 px-4 md:px-6 rounded-full text-lg md:text-xl shadow-lg transform transition hover:scale-105">⚫ 地獄</button>
            </div>
        </div>

        <!-- 遊戲結束遮罩 -->
        <div id="game-over-screen" class="absolute inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center rounded-2xl p-4">
            <div id="game-over-icon" class="text-7xl md:text-8xl mb-4">💀</div>
            <h2 id="game-over-title" class="text-3xl md:text-4xl font-black text-red-500 mb-4 text-center">怪獸餓暈了！</h2>
            <p class="text-xl md:text-2xl text-white mb-2">挑戰難度: <span id="final-level" class="font-bold"></span></p>
            <p class="text-lg md:text-xl text-gray-300 mb-2">完成時間: <span id="finish-time" class="font-bold text-blue-300"></span></p>
            <p class="text-xl md:text-2xl text-white mb-6">最終美味度: <span id="final-score" class="text-yellow-400 font-bold">0</span></p>
            <button onclick="showStartScreen()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-xl md:text-2xl shadow-lg transform transition hover:scale-105">
                🔄 回到主選單
            </button>
        </div>

        <!-- 頂部資訊列 -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-4 border-b-4 border-yellow-200 pb-2 gap-2">
            <div class="flex items-center gap-2 md:gap-3">
                <h1 class="text-2xl md:text-3xl font-black text-orange-600">🍲 怪獸廚房</h1>
                <span id="current-difficulty-badge" class="hidden text-xs md:text-base font-bold px-2 md:px-3 py-1 rounded-full text-white shadow-sm"></span>
            </div>
            <div class="flex items-center gap-2 md:gap-4 w-full md:w-auto justify-between md:justify-end">
                <button onclick="flee()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded-lg text-sm shadow transform transition hover:scale-105 whitespace-nowrap">🏃 逃離</button>
                <div class="text-lg md:text-xl font-bold bg-orange-100 px-3 md:px-4 py-1 md:py-2 rounded-xl text-orange-800">
                    美味度: <span id="score" class="text-2xl md:text-3xl text-red-500">0</span>
                </div>
            </div>
        </div>

        <!-- 怪獸飢餓度進度條 -->
        <div class="text-left mb-2 text-sm md:text-base">
            <span class="font-bold text-red-600">怪獸飢餓度 (快餵牠！):</span>
        </div>
        <div class="hunger-bar-container">
            <div id="hunger-bar" class="hunger-bar"></div>
        </div>

        <!-- 題目區 -->
        <div class="mb-4 md:mb-6">
            <p class="text-lg md:text-xl text-gray-700 font-bold mb-2">怪獸大廚需要 <span class="text-blue-600">最小公分母</span> 來煮湯！</p>
            <div class="flex items-center justify-center text-4xl md:text-5xl font-black text-gray-800">
                <div class="flex flex-col items-center mx-2 md:mx-4">
                    <span class="border-b-4 border-gray-800 px-2 text-2xl md:text-3xl">1</span>
                    <span id="denom1" class="text-green-600">?</span>
                </div>
                <span class="text-orange-400 text-2xl md:text-3xl">和</span>
                <div class="flex flex-col items-center mx-2 md:mx-4">
                    <span class="border-b-4 border-gray-800 px-2 text-2xl md:text-3xl">1</span>
                    <span id="denom2" class="text-green-600">?</span>
                </div>
            </div>
        </div>

        <!-- 回饋訊息 -->
        <div id="message" class="h-8 mb-4 font-bold text-xl md:text-2xl text-orange-500">拖曳或點擊食材丟進鍋裡！</div>

        <!-- 遊戲互動區 -->
        <div class="flex flex-col md:flex-row items-center justify-around bg-orange-50 rounded-2xl p-4 md:p-6 border-4 border-dashed border-orange-300">
            
            <!-- 桌子：放置食材 (三個選項) -->
            <div class="flex flex-wrap justify-center md:flex-col gap-3 md:gap-4 mb-6 md:mb-0" id="ingredients-table">
                <!-- 食材會透過 JavaScript 產生在這裡 -->
            </div>

            <!-- 爐子：怪獸的鍋子 -->
            <div class="flex flex-col items-center">
                <div id="monster-face" class="text-5xl md:text-6xl mb-2">👹</div>
                <div id="cooking-pot" 
                     class="w-32 h-32 md:w-40 md:h-40 bg-gray-800 rounded-full flex items-center justify-center text-6xl md:text-7xl border-8 border-gray-600 shadow-inner relative"
                     ondragover="allowDrop(event)" 
                     ondrop="handleDrop(event)">
                     <div class="absolute inset-2 bg-orange-500 rounded-full opacity-50 blur-md"></div>
                     🍲
                </div>
                <p class="mt-4 font-bold text-gray-600 text-sm md:text-base">拖曳或點擊餵食</p>
            </div>

        </div>
    </div>

    <script>
        let score = 0;
        let targetLCM = 0;
        
        const allDenoms = {
            easy: [2, 3, 4, 5, 6, 8, 10],
            medium: [2, 3, 4, 5, 6, 8, 9, 10, 12],
            hard: [3, 4, 6, 7, 8, 9, 11, 12, 14, 15],
            superHard: [5, 7, 8, 9, 11, 12, 13, 14, 15, 17],
            hell: [7, 11, 13, 17, 19, 23] 
        };
        let activeDenoms = allDenoms.medium;
        
        const foodEmojis = ['🥩', '🧅', '🍄', '🥕', '🥔', '🧀', '🍗', '🥦']; 

        // 緊張機制：飢餓度變數
        let hunger = 100; 
        let drainRate = 0.5; 
        let drainIncrease = 0.05; 
        let waitTime = 1500; 
        let penalty = 10; 
        let gameLoop; 
        let isGameOver = false;
        let currentLevelName = ""; 

        // 數學工具
        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
        function lcm(a, b) { return (a * b) / gcd(a, b); }

        function showStartScreen() {
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('current-difficulty-badge').classList.add('hidden');
        }

        function startGame(level) {
            const diffBadge = document.getElementById('current-difficulty-badge');
            diffBadge.classList.remove('hidden'); 

            if (level === 'easy') {
                drainRate = 0.15;      
                drainIncrease = 0.01;  
                penalty = 5;           
                activeDenoms = allDenoms.easy; 
                waitTime = 1500;       
                currentLevelName = "🟢 簡單"; 
                diffBadge.textContent = currentLevelName;
                diffBadge.className = "text-xs md:text-base font-bold px-2 md:px-3 py-1 rounded-full text-white shadow-sm bg-green-500";
            } else if (level === 'medium') {
                drainRate = 0.3;       
                drainIncrease = 0.03;  
                penalty = 10;          
                activeDenoms = allDenoms.medium;
                waitTime = 1000;       
                currentLevelName = "🟡 中等"; 
                diffBadge.textContent = currentLevelName;
                diffBadge.className = "text-xs md:text-base font-bold px-2 md:px-3 py-1 rounded-full text-white shadow-sm bg-yellow-500";
            } else if (level === 'hard') {
                drainRate = 0.5;       
                drainIncrease = 0.06;  
                penalty = 15;          
                activeDenoms = allDenoms.hard; 
                waitTime = 500;        
                currentLevelName = "🔴 困難"; 
                diffBadge.textContent = currentLevelName;
                diffBadge.className = "text-xs md:text-base font-bold px-2 md:px-3 py-1 rounded-full text-white shadow-sm bg-red-500";
            } else if (level === 'superHard') {
                drainRate = 0.8;       
                drainIncrease = 0.1;   
                penalty = 20;          
                activeDenoms = allDenoms.superHard; 
                waitTime = 300;        
                currentLevelName = "🟣 超困難"; 
                diffBadge.textContent = currentLevelName;
                diffBadge.className = "text-xs md:text-base font-bold px-2 md:px-3 py-1 rounded-full text-white shadow-sm bg-purple-600";
            } else if (level === 'hell') {
                drainRate = 1.2;       
                drainIncrease = 0.2;   
                penalty = 30;          
                activeDenoms = allDenoms.hell; 
                waitTime = 100;        
                currentLevelName = "⚫ 地獄"; 
                diffBadge.textContent = currentLevelName;
                diffBadge.className = "text-xs md:text-base font-bold px-2 md:px-3 py-1 rounded-full border border-red-500 text-red-500 shadow-sm bg-black";
            }

            score = 0;
            hunger = 100;
            isGameOver = false;
            
            document.getElementById('score').textContent = score;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('monster-face').textContent = '👹';
            
            clearInterval(gameLoop);
            gameLoop = setInterval(updateHunger, 100); 
            
            nextQuestion();
        }

        function updateHunger() {
            if (isGameOver) return;
            
            hunger -= drainRate; 
            if (hunger <= 0) {
                hunger = 0;
                endGame(); 
            }
            
            const bar = document.getElementById('hunger-bar');
            bar.style.width = hunger + '%';
            
            const monster = document.getElementById('monster-face');
            if (hunger > 50) {
                bar.style.backgroundColor = '#2ed573'; 
                monster.textContent = '👹';
            } else if (hunger > 20) {
                bar.style.backgroundColor = '#ffa502'; 
                monster.textContent = '😰'; 
            } else {
                bar.style.backgroundColor = '#ff4757'; 
                monster.textContent = '😱'; 
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameLoop); 
            
            document.getElementById('game-over-icon').textContent = "💀";
            document.getElementById('game-over-title').textContent = "怪獸餓暈了！";
            document.getElementById('game-over-title').className = "text-3xl md:text-4xl font-black text-red-500 mb-4 text-center";
            
            document.getElementById('game-over-screen').classList.remove('hidden'); 
            
            const now = new Date();
            const timeString = now.toLocaleString('zh-TW', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            
            document.getElementById('final-level').textContent = currentLevelName; 
            document.getElementById('finish-time').textContent = timeString;
            document.getElementById('final-score').textContent = score;
            
            document.getElementById('ingredients-table').innerHTML = ''; 
        }

        function flee() {
            if (isGameOver) return; 
            
            isGameOver = true;
            clearInterval(gameLoop); 
            
            document.getElementById('game-over-icon').textContent = "🏃💨";
            document.getElementById('game-over-title').textContent = "你逃出了廚房！";
            document.getElementById('game-over-title').className = "text-3xl md:text-4xl font-black text-blue-400 mb-4 text-center";
            
            document.getElementById('game-over-screen').classList.remove('hidden');
            
            const now = new Date();
            const timeString = now.toLocaleString('zh-TW', { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            
            document.getElementById('final-level').textContent = currentLevelName; 
            document.getElementById('finish-time').textContent = timeString;
            document.getElementById('final-score').textContent = score;
            
            document.getElementById('ingredients-table').innerHTML = ''; 
        }

        function nextQuestion() {
            let d1 = activeDenoms[Math.floor(Math.random() * activeDenoms.length)];
            let d2 = activeDenoms[Math.floor(Math.random() * activeDenoms.length)];
            while (d1 === d2) {
                d2 = activeDenoms[Math.floor(Math.random() * activeDenoms.length)];
            }
            
            targetLCM = lcm(d1, d2);
            document.getElementById('denom1').textContent = d1;
            document.getElementById('denom2').textContent = d2;
            document.getElementById('message').textContent = "拖曳或點擊食材丟進鍋裡！";
            document.getElementById('message').className = "h-8 mb-4 font-bold text-xl md:text-2xl text-orange-500";

            generateIngredients(d1, d2);
            document.getElementById('cooking-pot').classList.remove('pot-active');
        }

        function generateIngredients(d1, d2) {
            const table = document.getElementById('ingredients-table');
            table.innerHTML = ''; 

            let options = [targetLCM];
            let wrong1 = d1 * d2;
            if (wrong1 === targetLCM) wrong1 = targetLCM * 2;
            options.push(wrong1);
            options.push(targetLCM + Math.floor(Math.random() * 5) + 1);

            options.sort(() => Math.random() - 0.5);

            options.forEach(num => {
                const foodElement = document.createElement('div');
                const randomFood = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
                
                foodElement.innerHTML = `${randomFood} <span class="bg-white px-2 rounded-full text-xl md:text-2xl">${num}</span>`;
                foodElement.className = "ingredient bg-yellow-100 border-4 border-yellow-400 p-2 md:p-3 rounded-xl text-3xl md:text-4xl font-black text-gray-800 shadow-md flex items-center gap-2 select-none cursor-pointer transform transition hover:scale-105";
                
                // 大師魔法 1：支援原生拖曳 (給電腦版用)
                foodElement.draggable = true;
                foodElement.ondragstart = function(event) {
                    if(isGameOver) {
                        event.preventDefault(); 
                        return;
                    }
                    event.dataTransfer.setData("number", num);
                    document.getElementById('cooking-pot').classList.add('pot-active');
                };
                foodElement.ondragend = function() {
                    document.getElementById('cooking-pot').classList.remove('pot-active');
                }

                // 大師魔法 2：支援點擊 (給手機/平板用)
                foodElement.onclick = function() {
                    if(!isGameOver) {
                        // 點擊後，觸發鍋子發光特效並驗證答案
                        document.getElementById('cooking-pot').classList.add('pot-active');
                        setTimeout(() => checkAnswer(num), 150);
                    }
                };

                table.appendChild(foodElement);
            });
        }

        function allowDrop(event) {
            event.preventDefault(); 
        }

        function handleDrop(event) {
            event.preventDefault(); 
            if (isGameOver) return;
            const droppedNumber = parseInt(event.dataTransfer.getData("number"));
            checkAnswer(droppedNumber);
        }

        // 大師魔法 3：將檢查答案的邏輯獨立出來，讓拖曳和點擊都可以共用！
        function checkAnswer(droppedNumber) {
            if (isGameOver) return;
            const msg = document.getElementById('message');
            
            if (droppedNumber === targetLCM) {
                score += 10;
                document.getElementById('score').textContent = score;
                msg.textContent = "✨ 太美味啦！完美的公分母！";
                msg.className = "h-8 mb-4 font-bold text-xl md:text-2xl text-green-500";
                
                hunger = Math.min(100, hunger + 30); 
                drainRate += drainIncrease; 
                
                const pot = document.getElementById('cooking-pot');
                pot.style.transform = "scale(1.2)";
                setTimeout(() => pot.style.transform = "scale(1)", 300);

                setTimeout(nextQuestion, waitTime); 
            } else {
                score = Math.max(0, score - 5); 
                document.getElementById('score').textContent = score;
                msg.textContent = "🤢 嘔...怪獸吐了！數字不對！";
                msg.className = "h-8 mb-4 font-bold text-xl md:text-2xl text-red-500";

                hunger -= penalty; 
                updateHunger(); 
            }
        }

        window.onload = showStartScreen;
    </script>
</body>
</html>
