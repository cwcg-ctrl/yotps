<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>數學拔河大對決 Math Tug of War</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        :root {
            --p1-color: #3b4eba;
            --p2-color: #4aa9d5;
        }

        body {
            font-family: 'ZCOOL+KuaiLe', cursive, sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f2fe 100%);
            user-select: none;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            z-index: 0;
            animation: float 20s linear infinite;
        }
        @keyframes float {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 100px)); }
        }

        .rope-container {
            position: relative;
            height: 25vh;
            min-height: 200px;
            width: 100%;
            background: #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-top: 4px solid #4b5563;
            border-bottom: 12px solid #166534;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.1);
        }

        .rope {
            position: absolute;
            height: 12px;
            width: 400%;
            background: repeating-linear-gradient(
                45deg,
                #8b4513,
                #8b4513 15px,
                #a0522d 15px,
                #a0522d 30px
            );
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-marker {
            width: 10px;
            height: 60px;
            background: #ef4444;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            border-radius: 5px;
            border: 2px solid white;
        }

        .team-container {
            position: absolute;
            display: flex;
            align-items: flex-end;
            bottom: 15px;
            transition: all 0.3s ease;
        }

        .team-p1 { left: calc(50% - 280px); flex-direction: row-reverse; }
        .team-p2 { right: calc(50% - 280px); transform: scaleX(-1); }

        .char-wrapper {
            width: 85px;
            height: 130px;
            margin: 0 -10px; 
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15));
        }

        @media (max-width: 640px) {
            .team-p1 { left: calc(50% - 180px); }
            .team-p2 { right: calc(50% - 180px); }
            .char-wrapper { width: 60px; height: 100px; }
            .rope-container { min-height: 160px; }
        }

        .glass-zone {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            position: relative;
        }

        @keyframes pull-action {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10px, 4px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .pulling .char-wrapper { animation: pull-action 0.4s ease-in-out; }

        .choice-btn {
            background: white;
            transition: background-color 0.15s, transform 0.1s;
            border: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }
        .choice-btn:hover { background-color: #f8fafc; }
        .choice-btn:active { transform: scale(0.95); }

        .btn-disabled {
            opacity: 0.6;
            pointer-events: none;
            background-color: #f1f5f9;
        }

        #menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 58, 138, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .diff-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 999px;
            margin-top: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- 背景雲朵 -->
    <div class="cloud" style="top:5%; width:100px; height:30px; animation-delay: -2s;"></div>
    <div class="cloud" style="top:15%; width:140px; height:45px; animation-delay: -8s;"></div>

    <!-- 頂部標題 -->
    <div class="flex justify-between items-center px-4 sm:px-8 py-2 sm:py-4 bg-white/80 backdrop-blur-md shadow-sm z-30">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl font-black shadow rotate-3">1</div>
            <div id="p1-label" class="hidden xs:block text-blue-600 font-black">隊伍一</div>
        </div>
        
        <div class="relative bg-white px-6 py-1 rounded-full font-black text-orange-600 shadow-sm border border-orange-100 flex flex-col items-center">
            <span id="top-title">🪢 數學拔河對決 🪢</span>
            <div id="difficulty-indicator" class="hidden text-[10px] text-gray-500 uppercase tracking-widest mt-1"></div>
        </div>

        <div class="flex items-center space-x-2 text-right">
            <div id="p2-label" class="hidden xs:block text-cyan-600 font-black">隊伍二</div>
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center text-white text-xl font-black shadow -rotate-3">2</div>
        </div>
    </div>

    <!-- 拔河區域 -->
    <div class="rope-container">
        <div id="rope-group" class="absolute inset-0 flex items-center justify-center transition-transform duration-300">
            <div class="rope"><div class="center-marker"></div></div>
            <div id="team1" class="team-container team-p1">
                <div class="char-wrapper" id="char1-1"></div>
                <div class="char-wrapper" id="char1-2"></div>
                <div class="char-wrapper" id="char1-3"></div>
            </div>
            <div id="team2" class="team-container team-p2">
                <div class="char-wrapper" id="char2-1"></div>
                <div class="char-wrapper" id="char2-2"></div>
                <div class="char-wrapper" id="char2-3"></div>
            </div>
        </div>
    </div>

    <!-- 控制區域 -->
    <div class="flex-1 flex flex-col md:flex-row p-3 sm:p-6 gap-3 sm:gap-6 bg-green-800/5 overflow-y-auto">
        <!-- 玩家 1 -->
        <div id="p1-zone" class="flex-1 glass-zone flex flex-col items-center justify-center p-4">
            <div class="w-full mb-4">
                <div class="bg-white/90 p-4 rounded-2xl shadow-inner text-center">
                    <div class="text-3xl sm:text-5xl font-black text-blue-700" id="p1-question">...</div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 sm:gap-4 w-full" id="p1-options"></div>
            <div class="mt-4 flex items-center space-x-2">
                <span id="p1-score" class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full font-black">0</span>
            </div>
        </div>

        <!-- 玩家 2 / 電腦 -->
        <div id="p2-zone" class="flex-1 glass-zone flex flex-col items-center justify-center p-4">
            <div id="ai-thinking" class="absolute inset-0 bg-cyan-900/10 backdrop-blur-[2px] rounded-3xl hidden items-center justify-center z-10">
                <div id="ai-thinking-text" class="bg-white/90 px-4 py-2 rounded-full font-bold text-cyan-700 animate-pulse">電腦思考中...</div>
            </div>
            
            <div class="w-full mb-4">
                <div class="bg-white/90 p-4 rounded-2xl shadow-inner text-center">
                    <div class="text-3xl sm:text-5xl font-black text-cyan-700" id="p2-question">...</div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 sm:gap-4 w-full" id="p2-options"></div>
            <div class="mt-4 flex items-center space-x-2">
                <span id="p2-score" class="bg-cyan-600 text-white w-8 h-8 flex items-center justify-center rounded-full font-black">0</span>
            </div>
        </div>
    </div>

    <!-- 模式選單 -->
    <div id="menu-overlay">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl max-w-sm w-full text-center max-h-[95vh] overflow-y-auto">
            <h1 id="menu-title" class="text-4xl font-black mb-6 text-blue-900">選擇遊戲模式</h1>
            <div class="space-y-4">
                
                <!-- 新增：專項特訓模式 -->
                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p id="zone-times-table" class="text-sm font-bold text-blue-500 mb-2">📚 1-10 乘數表專區</p>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <button id="btn-single-training" onclick="startGame('pve', 'normal', 'times_table')" class="py-3 bg-blue-500 hover:bg-blue-600 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">單人特訓</button>
                        <button id="btn-pvp-times" onclick="startGame('pvp', 'normal', 'times_table')" class="py-3 bg-indigo-500 hover:bg-indigo-600 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">雙人對戰</button>
                        <button id="btn-endless" onclick="startGame('pve', 'endless', 'times_table')" class="py-3 bg-red-500 hover:bg-red-600 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95 shadow-red-500/30">無盡挑戰 🔥</button>
                    </div>
                </div>

                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <p id="zone-mixed-pve" class="text-sm font-bold text-gray-500 mb-3">🤖 電腦對戰難度 (混合題型)</p>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="btn-ultra-easy" onclick="startGame('pve', 'ultra_easy')" class="py-3 bg-teal-400 hover:bg-teal-500 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">超簡單</button>
                        <button id="btn-easy" onclick="startGame('pve', 'easy')" class="py-3 bg-green-500 hover:bg-green-600 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">簡單</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="btn-normal" onclick="startGame('pve', 'normal')" class="py-3 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">普通</button>
                        <button id="btn-hard" onclick="startGame('pve', 'hard')" class="py-3 bg-red-500 hover:bg-red-600 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">困難</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-extreme" onclick="startGame('pve', 'extreme')" class="py-3 bg-purple-600 hover:bg-purple-700 text-white font-black rounded-xl text-sm transition-all shadow-md active:scale-95">超困難</button>
                        <button id="btn-hell" onclick="startGame('pve', 'hell')" class="py-3 bg-gray-900 hover:bg-black text-red-500 border border-red-500 font-black rounded-xl text-sm transition-all shadow-md active:scale-95 shadow-red-900/50">地獄</button>
                    </div>
                </div>
                <div class="relative py-1 text-gray-400 font-bold">OR</div>
                <button id="btn-mixed-pvp" onclick="startGame('pvp', 'normal', 'mixed')" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white text-2xl font-black rounded-2xl shadow-lg transition-all transform hover:scale-105 active:scale-95">
                    👫 綜合雙人對戰
                </button>
            </div>
        </div>
    </div>

    <!-- 勝利面板 -->
    <div id="modal" class="fixed inset-0 bg-blue-900/80 hidden items-center justify-center z-50 p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4 animate-bounce">👑</div>
            <h2 id="winner-text" class="text-3xl font-black mb-2">隊伍獲勝！</h2>
            
            <!-- 難度與時間資訊區塊 -->
            <div id="win-info" class="mb-6 hidden flex-col items-center space-y-2">
                <div class="bg-gray-100 px-4 py-2 rounded-xl text-sm font-bold shadow-inner">
                    <span id="win-difficulty">難度：</span>
                </div>
                <div class="text-xs font-bold text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100" id="win-time">
                    時間：
                </div>
            </div>

            <button id="btn-back-menu" onclick="backToMenu()" class="w-full py-4 font-black text-white bg-green-500 hover:bg-green-600 active:scale-95 transition-all rounded-xl text-xl shadow-md">回選單</button>
        </div>
    </div>

    <!-- 語言切換按鈕 (固定於右下角) -->
    <button id="lang-toggle-btn" onclick="toggleLanguage()" class="fixed bottom-4 right-4 z-[110] bg-white text-blue-800 font-black py-3 px-5 rounded-full text-sm shadow-xl border-2 border-blue-200 transition-all active:scale-95 flex items-center gap-2">
        <span>🌐</span> English
    </button>

    <script>
        function createReferenceCharacterSVG(mainColor, isGirl = false) {
            const skin = "#fcd5c5";
            const pantsColor = "#1a1e4d";
            const hair = isGirl ? "#2d2d2d" : "#5d4037";
            return `
            <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
                <rect x="35" y="115" width="10" height="25" fill="${skin}"/>
                <rect x="55" y="115" width="10" height="25" fill="${skin}"/>
                <rect x="35" y="135" width="10" height="10" fill="white"/>
                <rect x="55" y="135" width="10" height="10" fill="white"/>
                <rect x="32" y="145" width="16" height="8" rx="4" fill="white" stroke="#ccc"/>
                <rect x="52" y="145" width="16" height="8" rx="4" fill="white" stroke="#ccc"/>
                <path d="M30 95 H70 V118 H52 V108 H48 V118 H30 Z" fill="${pantsColor}" />
                <rect x="30" y="65" width="40" height="15" fill="white" />
                <rect x="30" y="80" width="40" height="20" fill="${mainColor}" />
                <path d="M35 65 L50 75 L65 65" fill="white" stroke="#ddd" stroke-width="1"/>
                <path d="M22 68 L12 95" stroke="${skin}" stroke-width="8" stroke-linecap="round"/>
                <path d="M78 68 L88 95" stroke="${skin}" stroke-width="8" stroke-linecap="round"/>
                <circle cx="50" cy="40" r="24" fill="${skin}"/>
                <circle cx="42" cy="42" r="2" fill="#333"/>
                <circle cx="58" cy="42" r="2" fill="#333"/>
                <path d="M45 52 Q50 56 55 52" stroke="#d63031" stroke-width="1.5" fill="none"/>
                ${isGirl ? 
                    `<circle cx="22" cy="25" r="9" fill="${hair}"/><circle cx="78" cy="25" r="9" fill="${hair}"/>
                     <rect x="20" y="24" width="4" height="4" fill="#ff69b4"/><rect x="76" y="24" width="4" height="4" fill="#ff69b4"/>
                     <path d="M26 35 Q26 14 50 14 Q74 14 74 35" fill="${hair}"/>` : 
                    `<path d="M26 38 Q26 12 50 10 Q74 12 74 38 L74 32 Q50 22 26 32 Z" fill="${hair}"/>`}
            </svg>`;
        }

        const ropeGroup = document.getElementById('rope-group');
        const modal = document.getElementById('modal');
        const winnerText = document.getElementById('winner-text');
        const menuOverlay = document.getElementById('menu-overlay');
        const aiThinking = document.getElementById('ai-thinking');
        const difficultyIndicator = document.getElementById('difficulty-indicator');
        
        // 語系設定
        let currentLang = 'zh';
        const i18n = {
            zh: {
                team1: "隊伍一",
                team2: "隊伍二",
                ai: "電腦",
                title: "🪢 數學拔河對決 🪢",
                menuTitle: "選擇遊戲模式",
                timesTableZone: "📚 1-10 乘數表專區",
                singleTraining: "單人特訓",
                pvpTimesTable: "雙人對戰",
                pveMixed: "🤖 電腦對戰難度 (混合題型)",
                ultraEasy: "超簡單",
                easy: "簡單",
                normal: "普通",
                hard: "困難",
                extreme: "超困難",
                hell: "地獄",
                mixedPvP: "👫 綜合雙人對戰",
                aiThinking: "電腦思考中...",
                team1Win: "隊伍一獲勝！",
                team2Win: "隊伍二獲勝！",
                aiWin: "電腦獲勝！",
                backToMenu: "回選單",
                diffUltraEasy: "超簡單 👶",
                diffEasy: "簡單 🤖",
                diffNormal: "普通 🤖",
                diffHard: "困難 🤖",
                diffExtreme: "超困難 👿",
                diffHell: "地獄 💀",
                winTimesTableSingle: "🎉 成功完成：1-10 乘數表特訓",
                failTimesTableSingle: "💀 特訓失敗：乘數表還不夠熟喔！",
                winPvePrefix: "🎉 成功挑戰：",
                failPvePrefix: "💀 挑戰失敗：",
                winPvPTimesTable: "🎮 遊戲模式：雙人對戰 (乘數表) 👫",
                winPvPMixed: "🎮 遊戲模式：雙人對戰 (綜合) 👫",
                timePrefix: "完成時間：",
                endlessMode: "無盡挑戰 🔥",
                gameOver: "遊戲結束！",
                endlessScore: "🌟 最終分數："
            },
            en: {
                team1: "Team 1",
                team2: "Team 2",
                ai: "AI",
                title: "🪢 Math Tug of War 🪢",
                menuTitle: "Select Game Mode",
                timesTableZone: "📚 1-10 Times Table Zone",
                singleTraining: "Single Training",
                pvpTimesTable: "PvP Match",
                pveMixed: "🤖 PvE Difficulty (Mixed)",
                ultraEasy: "Ultra Easy",
                easy: "Easy",
                normal: "Normal",
                hard: "Hard",
                extreme: "Extreme",
                hell: "Hell",
                mixedPvP: "👫 Mixed PvP Match",
                aiThinking: "AI Thinking...",
                team1Win: "Team 1 Wins!",
                team2Win: "Team 2 Wins!",
                aiWin: "AI Wins!",
                backToMenu: "Back to Menu",
                diffUltraEasy: "Ultra Easy 👶",
                diffEasy: "Easy 🤖",
                diffNormal: "Normal 🤖",
                diffHard: "Hard 🤖",
                diffExtreme: "Extreme 👿",
                diffHell: "Hell 💀",
                winTimesTableSingle: "🎉 Success: 1-10 Times Table Training",
                failTimesTableSingle: "💀 Failed: Keep practicing!",
                winPvePrefix: "🎉 Success: ",
                failPvePrefix: "💀 Failed: ",
                winPvPTimesTable: "🎮 Mode: PvP (Times Table) 👫",
                winPvPMixed: "🎮 Mode: PvP (Mixed) 👫",
                timePrefix: "Time: ",
                endlessMode: "Endless 🔥",
                gameOver: "Game Over!",
                endlessScore: "🌟 Final Score: "
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLanguage();
        }

        function getDiffLabel(diffKey) {
            const map = {
                ultra_easy: 'diffUltraEasy', easy: 'diffEasy', normal: 'diffNormal',
                hard: 'diffHard', extreme: 'diffExtreme', hell: 'diffHell'
            };
            return i18n[currentLang][map[diffKey]];
        }

        function applyLanguage() {
            const t = i18n[currentLang];
            document.getElementById('p1-label').innerText = t.team1;
            document.getElementById('p2-label').innerText = gameState.mode === 'pve' ? t.ai : t.team2;
            document.getElementById('top-title').innerText = t.title;
            document.getElementById('menu-title').innerText = t.menuTitle;
            document.getElementById('zone-times-table').innerText = t.timesTableZone;
            document.getElementById('btn-single-training').innerText = t.singleTraining;
            document.getElementById('btn-pvp-times').innerText = t.pvpTimesTable;
            document.getElementById('zone-mixed-pve').innerText = t.pveMixed;
            document.getElementById('btn-ultra-easy').innerText = t.ultraEasy;
            document.getElementById('btn-easy').innerText = t.easy;
            document.getElementById('btn-normal').innerText = t.normal;
            document.getElementById('btn-hard').innerText = t.hard;
            document.getElementById('btn-extreme').innerText = t.extreme;
            document.getElementById('btn-hell').innerText = t.hell;
            document.getElementById('btn-mixed-pvp').innerText = t.mixedPvP;
            document.getElementById('ai-thinking-text').innerText = t.aiThinking;
            document.getElementById('btn-back-menu').innerText = t.backToMenu;
            document.getElementById('btn-endless').innerText = t.endlessMode;
            
            const langBtn = document.getElementById('lang-toggle-btn');
            langBtn.innerHTML = currentLang === 'zh' ? '<span>🌐</span> English' : '<span>🌐</span> 中文';
            
            if (menuOverlay.style.display === 'none') {
                if (gameState.mode === 'pve') {
                    if (gameState.questionType === 'times_table') {
                        if (gameState.difficulty === 'endless') {
                            difficultyIndicator.innerText = t.endlessMode;
                        } else {
                            difficultyIndicator.innerText = currentLang === 'zh' ? "📚 乘數表特訓 (普通)" : "📚 Times Table (Normal)";
                        }
                    } else {
                        difficultyIndicator.innerText = getDiffLabel(gameState.difficulty);
                    }
                } else {
                    if (gameState.questionType === 'times_table') {
                        difficultyIndicator.innerText = currentLang === 'zh' ? "📚 雙人乘數表對戰" : "📚 PvP Times Table";
                    }
                }
            }

            if (gameState.isGameOver) {
                renderWinInfo();
            }
        }

        let gameState = { 
            position: 0, 
            p1Score: 0, 
            p2Score: 0, 
            isGameOver: false, 
            p1Current: null, 
            p2Current: null,
            mode: 'pvp',
            difficulty: 'normal',
            questionType: 'mixed', // 'mixed' 或 'times_table'
            aiTimer: null
        };

        // 難度設定數據
        const DIFFICULTY_SETTINGS = {
            ultra_easy: { minTime: 4000, maxTime: 7000, accuracy: 0.6 },
            easy: { minTime: 3000, maxTime: 5000, accuracy: 0.7 },
            normal: { minTime: 2000, maxTime: 3500, accuracy: 0.85 },
            hard: { minTime: 1000, maxTime: 1800, accuracy: 0.98 },
            extreme: { minTime: 600, maxTime: 1200, accuracy: 0.99 },
            hell: { minTime: 300, maxTime: 700, accuracy: 1.0 }
        };

        function initCharacters() {
            const color1 = "#3b4eba"; 
            const color2 = "#4aa9d5"; 
            document.getElementById('char1-1').innerHTML = createReferenceCharacterSVG(color1, true);
            document.getElementById('char1-2').innerHTML = createReferenceCharacterSVG(color1, false);
            document.getElementById('char1-3').innerHTML = createReferenceCharacterSVG(color1, true);
            document.getElementById('char2-1').innerHTML = createReferenceCharacterSVG(color2, false);
            document.getElementById('char2-2').innerHTML = createReferenceCharacterSVG(color2, true);
            document.getElementById('char2-3').innerHTML = createReferenceCharacterSVG(color2, false);
        }

        function generateQuestion() {
            let a, b, answer, type;

            if (gameState.questionType === 'times_table') {
                // 1-10 乘數表模式
                a = Math.floor(Math.random() * 10) + 1; // 1 到 10
                b = Math.floor(Math.random() * 10) + 1; // 1 到 10
                answer = a * b;
                type = '×';
            } else {
                // 混合題型
                const isMultiply = Math.random() > 0.5;
                
                if (gameState.difficulty === 'ultra_easy') {
                    if (isMultiply) {
                        // 超簡單：1-10 乘數表
                        a = Math.floor(Math.random() * 10) + 1;
                        b = Math.floor(Math.random() * 10) + 1;
                        answer = a * b;
                        type = '×';
                    } else {
                        // 超簡單：一位數加1位數 和 一位數加2位數
                        a = Math.floor(Math.random() * 9) + 1; // 1-9
                        b = Math.floor(Math.random() * 99) + 1; // 1-99
                        
                        // 隨機交換順序，增加一點視覺變化
                        if (Math.random() > 0.5) {
                            let temp = a;
                            a = b;
                            b = temp;
                        }
                        answer = a + b;
                        type = '+';
                    }
                } else {
                    // 原本的混合模式 (大數字加法 / 2-9 乘法)
                    if (isMultiply) {
                        a = Math.floor(Math.random() * 8) + 2;
                        b = Math.floor(Math.random() * 9) + 2;
                        answer = a * b;
                        type = '×';
                    } else {
                        a = Math.floor(Math.random() * 40) + 10;
                        b = Math.floor(Math.random() * 40) + 10;
                        answer = a + b;
                        type = '+';
                    }
                }
            }

            const options = [answer];
            
            // 生成三個錯誤選項
            while (options.length < 4) {
                let wrong;
                if (gameState.questionType === 'times_table' && Math.random() > 0.4) {
                    // 為了乘數表特訓，故意生成「背錯」的常見干擾選項（多加或少加一個被乘數）
                    wrong = answer + (Math.random() > 0.5 ? a : -a);
                    if (wrong <= 0 || options.includes(wrong)) {
                        wrong = answer + (Math.floor(Math.random() * 5) + 1);
                    }
                } else {
                    // 一般干擾項
                    let off = Math.floor(Math.random() * 10) - 5;
                    if (off === 0) off = 2;
                    wrong = answer + off;
                }
                
                if (wrong > 0 && !options.includes(wrong)) {
                    options.push(wrong);
                }
            }
            return { text: `${a} ${type} ${b}`, answer, options: options.sort(() => Math.random() - 0.5) };
        }

        function startGame(mode, diff = 'normal', qType = 'mixed') {
            gameState.mode = mode;
            gameState.difficulty = diff;
            gameState.questionType = qType;
            menuOverlay.style.display = 'none';
            
            const t = i18n[currentLang];
            if (mode === 'pve') {
                document.getElementById('p2-label').innerText = t.ai;
                if (qType === 'times_table') {
                    if (diff === 'endless') {
                        difficultyIndicator.innerText = t.endlessMode;
                    } else {
                        difficultyIndicator.innerText = currentLang === 'zh' ? "📚 乘數表特訓 (普通)" : "📚 Times Table (Normal)";
                    }
                } else {
                    difficultyIndicator.innerText = getDiffLabel(diff);
                }
                difficultyIndicator.classList.remove('hidden');
            } else {
                document.getElementById('p2-label').innerText = t.team2;
                if (qType === 'times_table') {
                    difficultyIndicator.innerText = currentLang === 'zh' ? "📚 雙人乘數表對戰" : "📚 PvP Times Table";
                    difficultyIndicator.classList.remove('hidden');
                } else {
                    difficultyIndicator.classList.add('hidden');
                }
            }
            
            resetGame();
        }

        function backToMenu() {
            modal.classList.replace('flex', 'hidden');
            menuOverlay.style.display = 'flex';
            if (gameState.aiTimer) clearTimeout(gameState.aiTimer);
        }

        function refreshPlayer(player) {
            if (gameState.isGameOver) return;
            const current = generateQuestion();
            if (player === 1) gameState.p1Current = current;
            else gameState.p2Current = current;

            document.getElementById(`p${player}-question`).innerText = current.text;
            const container = document.getElementById(`p${player}-options`);
            container.innerHTML = '';
            
            const isAI = (player === 2 && gameState.mode === 'pve');
            
            current.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `choice-btn py-3 sm:py-5 text-xl sm:text-3xl font-black ${player === 1 ? 'text-blue-700 border-blue-100' : 'text-cyan-700 border-cyan-100'} rounded-xl shadow-sm border ${isAI ? 'btn-disabled' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(player, opt);
                container.appendChild(btn);
            });

            if (isAI) startAIAction();
        }

        function startAIAction() {
            if (gameState.isGameOver || gameState.mode !== 'pve') return;
            
            aiThinking.classList.replace('hidden', 'flex');
            
            let settings;
            if (gameState.difficulty === 'endless') {
                // 無盡模式：隨著分數提升，等級增加，時間縮短，準確率提高
                const level = Math.floor(gameState.p1Score / 5);
                settings = {
                    minTime: Math.max(400, 3500 - level * 300),
                    maxTime: Math.max(800, 5500 - level * 450),
                    accuracy: Math.min(1.0, 0.6 + level * 0.05)
                };
            } else {
                settings = DIFFICULTY_SETTINGS[gameState.difficulty];
            }
            
            const thinkingTime = settings.minTime + Math.random() * (settings.maxTime - settings.minTime);
            
            gameState.aiTimer = setTimeout(() => {
                aiThinking.classList.replace('flex', 'hidden');
                
                // 根據難度準確性決定是否答對
                const isCorrect = Math.random() < settings.accuracy;
                const answer = isCorrect ? gameState.p2Current.answer : gameState.p2Current.options.find(o => o !== gameState.p2Current.answer);
                
                checkAnswer(2, answer);
            }, thinkingTime);
        }

        function checkAnswer(player, val) {
            if (gameState.isGameOver) return;
            if (player === 2 && gameState.aiTimer) clearTimeout(gameState.aiTimer);

            const isCorrect = val === (player === 1 ? gameState.p1Current : gameState.p2Current).answer;
            const step = window.innerWidth < 640 ? 40 : 70;

            if (isCorrect) {
                document.getElementById(player === 1 ? 'team1' : 'team2').classList.add('pulling');
                setTimeout(() => document.getElementById(player === 1 ? 'team1' : 'team2').classList.remove('pulling'), 400);
                if (player === 1) { gameState.position -= step; gameState.p1Score++; }
                else { gameState.position += step; gameState.p2Score++; }
            } else {
                // 答錯會被往反方向拉
                if (player === 1) gameState.position += step/2;
                else gameState.position -= step/2;
            }
            
            // 無盡模式下，限制玩家不能把繩子拉過勝利線，確保只能一直防守
            const threshold = window.innerWidth * (window.innerWidth < 640 ? 0.35 : 0.25);
            if (gameState.difficulty === 'endless' && gameState.position < -threshold + step) {
                gameState.position = -threshold + step;
            }
            
            refreshPlayer(player);
            updateVisuals();
            checkWin();
        }

        function updateVisuals() {
            ropeGroup.style.transform = `translateX(${gameState.position}px)`;
            document.getElementById('p1-score').innerText = gameState.p1Score;
            document.getElementById('p2-score').innerText = gameState.p2Score;
        }

        function checkWin() {
            const threshold = window.innerWidth * (window.innerWidth < 640 ? 0.35 : 0.25);
            if (gameState.difficulty === 'endless') {
                if (gameState.position >= threshold) {
                    gameState.isGameOver = true;
                    if (gameState.aiTimer) clearTimeout(gameState.aiTimer);
                    renderWinInfo();
                    modal.classList.replace('hidden', 'flex');
                }
            } else {
                if (Math.abs(gameState.position) >= threshold) {
                    gameState.isGameOver = true;
                    if (gameState.aiTimer) clearTimeout(gameState.aiTimer);
                    renderWinInfo();
                    modal.classList.replace('hidden', 'flex');
                }
            }
        }

        function renderWinInfo() {
            const t = i18n[currentLang];
            const isP1 = gameState.position < 0;
            
            const winInfo = document.getElementById('win-info');
            const winDiff = document.getElementById('win-difficulty');
            const winTime = document.getElementById('win-time');
            
            if (gameState.difficulty === 'endless') {
                winnerText.innerText = t.gameOver;
                winDiff.innerText = `${t.endlessScore} ${gameState.p1Score}`;
                winDiff.className = "text-red-600 font-black text-xl";
            } else {
                winnerText.innerText = isP1 ? t.team1Win : (gameState.mode === 'pve' ? t.aiWin : t.team2Win);
                
                if (gameState.mode === 'pve') {
                    if (gameState.questionType === 'times_table') {
                        if (isP1) {
                            winDiff.innerText = t.winTimesTableSingle;
                            winDiff.className = "text-green-600 font-bold";
                        } else {
                            winDiff.innerText = t.failTimesTableSingle;
                            winDiff.className = "text-red-500 font-bold";
                        }
                    } else {
                        if (isP1) {
                            winDiff.innerText = t.winPvePrefix + getDiffLabel(gameState.difficulty);
                            winDiff.className = "text-green-600 font-bold";
                        } else {
                            winDiff.innerText = t.failPvePrefix + getDiffLabel(gameState.difficulty);
                            winDiff.className = "text-red-500 font-bold";
                        }
                    }
                } else {
                    if (gameState.questionType === 'times_table') {
                        winDiff.innerText = t.winPvPTimesTable;
                    } else {
                        winDiff.innerText = t.winPvPMixed;
                    }
                    winDiff.className = "text-blue-600 font-bold";
                }
            }
            
            const now = new Date();
            winTime.innerText = `${t.timePrefix}${now.toLocaleString(currentLang === 'zh' ? 'zh-TW' : 'en-US', { hour12: false })}`;
            
            winInfo.classList.remove('hidden');
            winInfo.classList.add('flex');
        }

        function resetGame() {
            gameState.position = 0;
            gameState.p1Score = 0;
            gameState.p2Score = 0;
            gameState.isGameOver = false;
            if (gameState.aiTimer) clearTimeout(gameState.aiTimer);
            
            modal.classList.replace('flex', 'hidden');
            aiThinking.classList.replace('flex', 'hidden');
            updateVisuals();
            refreshPlayer(1);
            refreshPlayer(2);
        }

        window.onload = () => { initCharacters(); };
        window.addEventListener('resize', updateVisuals);
    </script>
</body>
