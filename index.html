<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張Sir的學習遊戲站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2.5rem;
        }

        .link-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: scale(1.03) translateY(-5px);
            background: rgba(255, 255, 255, 1);
        }

        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .link-card:hover::after {
            left: 100%;
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .avatar-container:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .icon-box {
            transition: transform 0.3s ease;
        }

        .link-card:hover .icon-box {
            transform: rotate(12deg) scale(1.1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <!-- 主面板 -->
        <div class="glass-panel shadow-2xl p-8 md:p-12">
            
            <!-- 標題區域 -->
            <header class="text-center mb-10">
                <div class="avatar-container mb-6">
                    <!-- 使用頭像圖像 -->
                    <img src="IMG_6905.PNG" alt="張Sir">
                </div>
                <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-2">
                    張Sir的學習遊戲站
                </h1>
                <div class="h-1.5 w-24 bg-indigo-500 mx-auto rounded-full opacity-80"></div>
            </header>

            <!-- 連結列表 -->
            <div class="space-y-4">
                
                <!-- 數學拔河 -->
                <a href="https://cwcg-ctrl.github.io/yotps/MATH01.html" target="_blank" 
                   class="link-card flex items-center p-5 rounded-2xl bg-white/60 border border-white shadow-sm group">
                    <div class="icon-box w-14 h-14 bg-amber-400 text-white text-2xl rounded-xl flex items-center justify-center shadow-lg shadow-amber-200">
                        🏆
                    </div>
                    <div class="ml-5">
                        <div class="font-bold text-slate-800 text-xl group-hover:text-amber-600 transition-colors">數學拔河</div>
                        <div class="text-sm text-slate-500">趣味競技，提升心算與邏輯</div>
                    </div>
                    <div class="ml-auto text-slate-300 group-hover:text-amber-400 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </a>

                <!-- 魔法藥水實驗室 -->
                <a href="https://cwcg-ctrl.github.io/yotps/MATH02.html" target="_blank" 
                   class="link-card flex items-center p-5 rounded-2xl bg-white/60 border border-white shadow-sm group">
                    <div class="icon-box w-14 h-14 bg-purple-500 text-white text-2xl rounded-xl flex items-center justify-center shadow-lg shadow-purple-200">
                        🧪
                    </div>
                    <div class="ml-5">
                        <div class="font-bold text-slate-800 text-xl group-hover:text-purple-600 transition-colors">魔法藥水實驗室</div>
                        <div class="text-sm text-slate-500">解開分數之謎，調配正確比例藥水</div>
                    </div>
                    <div class="ml-auto text-slate-300 group-hover:text-purple-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </a>

                <!-- 空位 2 -->
                <div class="link-card flex items-center p-5 rounded-2xl bg-white/40 border border-dashed border-slate-300 opacity-60">
                    <div class="w-14 h-14 bg-slate-200 text-white text-2xl rounded-xl flex items-center justify-center">
                        🔒
                    </div>
                    <div class="ml-5">
                        <div class="font-bold text-slate-400 text-xl">敬請期待</div>
                        <div class="text-sm text-slate-400">下一個精彩遊戲正在開發中</div>
                    </div>
                </div>

                <!-- 空位 3 -->
                <div class="link-card flex items-center p-5 rounded-2xl bg-white/40 border border-dashed border-slate-300 opacity-60">
                    <div class="w-14 h-14 bg-slate-200 text-white text-2xl rounded-xl flex items-center justify-center">
                        🔒
                    </div>
                    <div class="ml-5">
                        <div class="font-bold text-slate-400 text-xl">敬請期待</div>
                        <div class="text-sm text-slate-400">此連結目前為空白</div>
                    </div>
                </div>

            </div>

            <!-- 裝飾元素 -->
            <div class="mt-10 text-center">
                <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest">
                    Select a game to start learning
                </p>
            </div>
        </div>
    </div>

</body>
</html>
