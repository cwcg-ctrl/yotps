<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習遊戲站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .link-card {
            transition: all 0.2s ease-in-out;
        }
        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="max-w-3xl mx-auto px-4 py-12 w-full">
        <!-- 標題區域 -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">學習遊戲站</h1>
        </header>

        <!-- 連結分類區 -->
        <div class="max-w-md mx-auto">
            
            <!-- 分類: 學習遊戲 -->
            <section>
                <h2 class="text-xl font-bold text-slate-700 mb-6 flex items-center justify-center gap-2">
                    <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                    精選學習遊戲
                </h2>
                <div class="grid grid-cols-1 gap-4">
                    <a href="https://codecombat.com/" target="_blank" class="link-card block bg-white p-5 rounded-xl border border-slate-200 flex items-center gap-4">
                        <div class="w-12 h-12 bg-amber-100 text-2xl rounded-lg flex items-center justify-center">⚔️</div>
                        <div>
                            <div class="font-semibold text-slate-800 text-lg">CodeCombat</div>
                            <div class="text-sm text-slate-500">透過 RPG 遊戲學習程式語言</div>
                        </div>
                    </a>
                    
                    <a href="https://www.typingclub.com/" target="_blank" class="link-card block bg-white p-5 rounded-xl border border-slate-200 flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-100 text-2xl rounded-lg flex items-center justify-center">⌨️</div>
                        <div>
                            <div class="font-semibold text-slate-800 text-lg">TypingClub</div>
                            <div class="text-sm text-slate-500">趣味打字練習遊戲</div>
                        </div>
                    </a>

                    <a href="https://www.duolingo.com/" target="_blank" class="link-card block bg-white p-5 rounded-xl border border-slate-200 flex items-center gap-4">
                        <div class="w-12 h-12 bg-green-100 text-2xl rounded-lg flex items-center justify-center">🦉</div>
                        <div>
                            <div class="font-semibold text-slate-800 text-lg">Duolingo</div>
                            <div class="text-sm text-slate-500">像玩遊戲一樣學習外語</div>
                        </div>
                    </a>

                    <a href="https://scratch.mit.edu/" target="_blank" class="link-card block bg-white p-5 rounded-xl border border-slate-200 flex items-center gap-4">
                        <div class="w-12 h-12 bg-orange-100 text-2xl rounded-lg flex items-center justify-center">🐱</div>
                        <div>
                            <div class="font-semibold text-slate-800 text-lg">Scratch</div>
                            <div class="text-sm text-slate-500">創造你自己的互動故事與遊戲</div>
                        </div>
                    </a>
                </div>
            </section>
        </div>
    </div>

</body>
</html>
